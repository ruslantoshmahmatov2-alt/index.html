<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yer va Oy 3D Modeli</title>
    <style>
/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 8; // Ikkalasini ko'rish uchun kamerani uzoqlashtirdik

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const textureLoader = new THREE.TextureLoader();

        // 1. Yulduzli fon (Kosmos)
        const starTexture = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/galaxy.png'); // Ixtiyoriy yulduzli rasm
        scene.background = new THREE.Color(0x050505); 

        // 2. Yer (Earth)
        const earthGeometry = new THREE.SphereGeometry(2, 64, 64);
        const earthTexture = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg');
        const earthMaterial = new THREE.MeshStandardMaterial({ map: earthTexture });
        const earth = new THREE.Mesh(earthGeometry, earthMaterial);
        scene.add(earth);

        // 3. Oy (Moon)
        const moonGeometry = new THREE.SphereGeometry(0.5, 32, 32);
        const moonTexture = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/moon_1024.jpg');
        const moonMaterial = new THREE.MeshStandardMaterial({ map: moonTexture });
        const moon = new THREE.Mesh(moonGeometry, moonMaterial);
        
        // Oyni Yerdan uzoqroqqa joylashtiramiz
        moon.position.set(5, 0, 0);

        // 4. Oyning orbitasi uchun guruh yaratamiz
        const moonOrbit = new THREE.Group();
        moonOrbit.add(moon);
        scene.add(moonOrbit); // Bu guruh Yer bilan bir xil markazda turadi

        // 5. Yorug'lik (Quyosh nuri kabi)
        const light = new THREE.PointLight(0xffffff, 1.5);
        light.position.set(10, 10, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040)); // Atrof-muhit yorug'ligi

        // 6. Boshqaruv
        const controls = new THREE.OrbitControls(camera, renderer.domElement);

        // Animatsiya
        function animate() {
            requestAnimationFrame(animate);

            // Yer o'z o'qi atrofida aylanadi
            earth.rotation.y += 0.005;

            // Oy o'z o'qi atrofida aylanadi
            moon.rotation.y += 0.01;

            // Oy Yer atrofida aylanadi (guruhni aylantirish orqali)
            moonOrbit.rotation.y += 0.008;

            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
